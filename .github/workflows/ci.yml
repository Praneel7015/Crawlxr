name: Blockchain Crawler CI/CD

on:
  push:
    branches: [ main, develop]
  pull_request:
    branches: [ main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies (Client)
      run: npm install --prefix client
    - name: Install Dependencies (Server)
      run: npm install --prefix server
    - name: Run ESLint on Client
      run: npm run lint --prefix client
    - name: Run ESLint on Server
      run: npm run lint --prefix server

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies (Client)
      run: npm install --prefix client
    - name: Install Dependencies (Server)
      run: npm install --prefix server
    - name: Run Unit Tests (Client)
      run: npm test --prefix client
    - name: Run Unit Tests (Server)
      run: npm test --prefix server

  security_scan:
    name: Security Scan (Dependency Check)
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies (Server)
      run: npm install --prefix server
    - name: Run Dependency Scan (Example: npm audit)
      run: npm audit --prefix server

  integration_test:
    name: Integration Tests (API & Contract Simulation)
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Environment Variables
      run: echo "# Assuming necessary secrets are configured in GitHub Secrets"
    
    - name: Deploy Contract (Simulation/Test Deployment)
      run: | 
        # In a real scenario, you would use Hardhat/Ethers actions here to deploy a test contract
        echo "Simulating contract deployment for integration tests..."
        # npm run deploy:sepolia --prefix contracts # Uncomment for actual deployment

    - name: Run Integration Tests (Server API)
      run: | 
        # Assuming you have an integration test script in server/package.json
        npm run integration-test --prefix server

  smoke_test:
    name: Smoke Test (Frontend & Basic API Health)
    needs: integration_test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies (Client)
      run: npm install --prefix client

    - name: Run Frontend Build & Test
      run: npm run build --prefix client && npm run preview --prefix client

    - name: Smoke Test Server Health Check
      run: | 
        # Check if the server can start and respond to health check
        curl -s http://localhost:5000/health

  package_release:
    name: Package & Release
    needs: smoke_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Client Artifacts
      run: npm run build --prefix client

    - name: Build Server Artifacts" 
      run: npm run build --prefix server

    - name: Create Release Tag (Simulated)
      run: | 
        echo "Simulating Git tag creation and release...
        # git tag v$(date +%Y%m%d%H%M%S) && git push origin v$(date +%Y%m%d%H%M%S)"

  deploy_canary:
    name: Canary Deployment to Sepolia
    needs: package_release
    runs-on: ubuntu-latest
    # Conditional deployment based on environment/branch if needed
    if: github.ref == 'refs/heads/main'
    environment: Sepolia
    steps:
    - name: Setup Environment
      run: | 
        echo "Deploying artifacts to Sepolia network..."

    - name: Deploy to Sepolia (Canary)
      run: | 
        # Placeholder for actual deployment script using Hardhat/Ethers
        echo "Executing canary deployment script..."
        # npm run deploy:canary --prefix contracts

  notify:
    name: Notify Success/Failure
    needs: [deploy_canary, rollback]
    runs-on: ubuntu-latest
    if: always() # Always run to send notification on success or failure
    steps:
    - name: Send Notification via Slack/Teams
      run: | 
        # Placeholder for actual notification script using secrets
        echo "Sending pipeline status notification to channel #devops-alerts..."
"
}
